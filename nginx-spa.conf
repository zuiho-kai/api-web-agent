server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml+rss application/atom+xml image/svg+xml;
    gzip_min_length 1024;

    # Long-cache hashed assets
    location ~* \.(?:js|css|woff2?|svg|png|jpe?g|webp|gif|ico)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback + WebContainers-friendly headers
    location / {
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        try_files $uri $uri/ /index.html;
    }
}
