name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.3)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  # ─── Web artifacts: dist.zip + single-HTML + Docker image ───
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install --no-audit --no-fund

      - name: Determine tag
        id: tag
        run: echo "name=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Build dist (regular, code-split)
        run: npm run build

      - name: Pack dist.zip
        run: |
          cd dist
          zip -qr "../api-web-agent-${{ steps.tag.outputs.name }}-dist.zip" .

      - name: Build single-HTML portable
        run: |
          rm -rf dist
          BUILD_TARGET=singlefile npm run build
          cp dist/index.html "api-web-agent-${{ steps.tag.outputs.name }}-portable.html"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Restore code-split dist for Docker image
        run: |
          rm -rf dist
          npm run build

      - name: Build + push Docker image (linux/amd64,arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/api-web-agent:latest
            ghcr.io/${{ github.repository_owner }}/api-web-agent:${{ steps.tag.outputs.name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload web assets to release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.tag.outputs.name }}
          tag_name: ${{ steps.tag.outputs.name }}
          files: |
            api-web-agent-${{ steps.tag.outputs.name }}-dist.zip
            api-web-agent-${{ steps.tag.outputs.name }}-portable.html
          generate_release_notes: true
          fail_on_unmatched_files: false

  # ─── Tauri native bundles: .exe / .dmg / .AppImage / .deb ───
  tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Install Linux Tauri deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: npm install --no-audit --no-fund

      - name: Build Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: ${{ inputs.tag || github.ref_name }}
          args: --target ${{ matrix.target }}
