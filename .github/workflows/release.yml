name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.2)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install + build dist/
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Determine release tag name
        id: tag
        run: |
          NAME="${{ inputs.tag || github.ref_name }}"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "Releasing $NAME"

      - name: Pack dist.zip
        run: |
          cd dist
          zip -qr "../api-web-agent-${{ steps.tag.outputs.name }}-dist.zip" .

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build + push Docker image (linux/amd64,arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/api-web-agent:latest
            ghcr.io/${{ github.repository_owner }}/api-web-agent:${{ steps.tag.outputs.name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create / update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.tag.outputs.name }}
          tag_name: ${{ steps.tag.outputs.name }}
          files: |
            api-web-agent-${{ steps.tag.outputs.name }}-dist.zip
          generate_release_notes: true
          fail_on_unmatched_files: false
