name: Build and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  IMAGE_NAME: api-web-agent
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/api-web-agent:latest
            ghcr.io/${{ github.repository_owner }}/api-web-agent:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GH_TOKEN
          script: |
            set -e
            echo "$GH_TOKEN" | docker login ghcr.io -u zuiho-kai --password-stdin
            docker pull ghcr.io/zuiho-kai/api-web-agent:latest
            docker stop api-web-agent 2>/dev/null || true
            docker rm api-web-agent 2>/dev/null || true
            docker run -d --name api-web-agent \
              --restart unless-stopped \
              -p 8080:80 \
              ghcr.io/zuiho-kai/api-web-agent:latest
            sleep 3
            docker ps --filter name=api-web-agent --format "{{.Status}}"
            curl -s -o /dev/null -w "Local 8080 → HTTP %{http_code}\n" http://localhost:8080/
            # Prune old images to save disk (keep latest + sha)
            docker image prune -f --filter "label=org.opencontainers.image.title=api-web-agent" 2>/dev/null || true
