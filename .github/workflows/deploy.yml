name: Build and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build (with lock-provider env from secrets)
        env:
          # When these secrets are set on the repo, the deployed SPA boots
          # in locked-provider mode. Public OSS clones without these env
          # vars build in normal BYO-key mode.
          VITE_LOCK_PROVIDER: ${{ secrets.LOCK_PROVIDER }}
          VITE_LOCKED_BASE_URL: ${{ secrets.LOCKED_BASE_URL }}
          VITE_LOCKED_PROVIDER_NAME: ${{ secrets.LOCKED_PROVIDER_NAME }}
        run: npm run build

      - name: Deploy dist/ to server (rsync over SSH)
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H -t ed25519,rsa "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
          rsync -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            -rltDvz --delete \
            dist/ "root@$HOST:/srv/agent/"

      - name: Smoke test
        run: |
          curl -fsS -m 10 "http://${{ secrets.SERVER_HOST }}:8080/" -o /dev/null
          echo "✓ http://${{ secrets.SERVER_HOST }}:8080/ returns 200"
