name: Build and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Deploy dist/ to server
        uses: easingthemes/ssh-deploy@v5
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: root
          REMOTE_PORT: 22
          SOURCE: "dist/"
          TARGET: "/srv/agent/"
          # -r recursive, -l symlinks, -t times, -D devices, -v verbose, -z compress
          # --delete removes files on remote that no longer exist in dist/
          ARGS: "-rltDvz --delete"

      - name: Smoke test
        run: |
          curl -fsS -m 10 "http://${{ secrets.SERVER_HOST }}:8080/" -o /dev/null
          echo "✓ http://${{ secrets.SERVER_HOST }}:8080/ returns 200"
